services:
  agycli2api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ghcr.io/arocial/agycli2api:latest
    ports:
      - '3403:3403'
    environment:
      - PORT=3403
    volumes:
      - gemini-data:/root/.gemini
    restart: unless-stopped

volumes:
  gemini-data:
